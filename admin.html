<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
}

#resultado{
    margin-top:20px;
    white-space:pre-wrap;
    text-align:left;
    background:#222;
    padding:15px;
    border-radius:10px;
    width:400px;
}
</style>
</head>

<body>

<h1>Painel Admin</h1>

<input type="password" id="senha" placeholder="Senha">

<br>

<button onclick="resetar()">
RESETAR RANKING
</button>

<button onclick="verOnline()">
VER ONLINE
</button>

<div id="resultado"></div>

<script>

const API = "https://elementrix-api.onrender.com";

async function resetar(){

    let senha =
        document.getElementById("senha").value;

    let res = await fetch(
        `${API}/reset`,
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify({
                senha: senha
            })
        }
    );

    let dados = await res.json();

    if(dados.ok){

        alert("Ranking resetado!");

    }else{

        alert("Senha errada!");
    }
}

async function verOnline(){

    let senha =
        document.getElementById("senha").value;

    let res = await fetch(
        `${API}/online-admin`,
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify({
                senha: senha
            })
        }
    );

    let dados = await res.json();

    if(dados.error){

        alert("Senha errada!");
        return;
    }

    document.getElementById("resultado")
    .textContent =
`Online: ${dados.online}

Usuários:
${dados.usuarios.join("\n")}`;
}

</script>

</body>
</html>
