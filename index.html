<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElemenTrix</title>
    <style>
        body{
            overflow: hidden;
            margin:0;
            min-height:100vh;

            background:
            linear-gradient(
                135deg,
                #ff5a00 0%,
                #311000 25%,
                #111111 50%,
                #001a33 75%,
                #00b7ff 100%
            );
        }
        #input_nome{
            font: 50px Arial;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <input type="text" id="input_nome" placeholder="Digite seu nome de usuário">
    <script>
        let input = document.querySelector("#input_nome");
        input.addEventListener("keydown", function(event) {
            if(event.key == "Enter"){
                jogar();
            }
        })
        
        function jogar(){
            let nome = input.value;
            if(nome == ""){
                window.alert("Digite um nome");
                return 1;
            }
            let tamanho = nome.length;
            if(tamanho >= 16 || tamanho <3){
                window.alert("O nome deve ter de 3 a 15 caracteres");
                return 1;
            }
            let confirmar = confirm(`Tem certeza que seu nome será ${nome}?`);
            if(confirmar){
                let usuario ={
                    nome: nome,
                    pontos: 0
                };

                localStorage.setItem("usuario", JSON.stringify(usuario));
                async function salvar(){
                await fetch("http://localhost:3000/usuario", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(usuario)
                });
            }
                let timeout = null;
                function salvarDebounce(){
                    clearTimeout(timeout);
                    timeout = setTimeout(salvar, 500);
                }
                salvar();
                salvarDebounce();
                window.location.href = "menu.html";
            }
        }
    </script>
</body>
</html>
