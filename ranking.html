<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ranking</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    overflow-x:hidden;

    background:
    linear-gradient(
        135deg,
        #ff5a00 0%,
        #311000 25%,
        #111111 50%,
        #001a33 75%,
        #00b7ff 100%
    );

    color:white;
}

h1{
    text-align:center;
    margin-top:30px;
    font-size:55px;

    text-shadow:
    0 0 10px rgba(255,255,255,.3),
    0 0 20px rgba(0,183,255,.4);
}

#top3{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:25px;

    margin-top:40px;
    flex-wrap:wrap;
}

.top{
    width:220px;
    border-radius:25px 25px 0 0;
    padding:20px;

    text-align:center;

    backdrop-filter: blur(8px);

    box-shadow:
    0 0 20px rgba(0,0,0,.5);

    transition:.25s;
}

.top:hover{
    transform:translateY(-10px) scale(1.03);
}

.top h2{
    margin:0;
    font-size:40px;
}

.top p{
    margin:10px 0;
    font-size:22px;
}

.gold{
    height:300px;

    background:
    linear-gradient(
        to top,
        #ffb300,
        #ffe082
    );

    color:black;
}

.silver{
    height:240px;

    background:
    linear-gradient(
        to top,
        #9e9e9e,
        #eeeeee
    );

    color:black;
}

.bronze{
    height:200px;

    background:
    linear-gradient(
        to top,
        #8d4f22,
        #cd7f32
    );
}

#lista{
    width:90%;
    max-width:800px;

    margin:50px auto;
}

.item{
    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.12);

    margin:12px 0;

    padding:18px 22px;

    border-radius:18px;

    font-size:24px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    backdrop-filter:blur(5px);

    transition:.2s;
}

.item:hover{
    transform:scale(1.02);

    background:rgba(255,255,255,.13);
}

.posicao{
    font-weight:bold;
    color:#00b7ff;
}

.pontos{
    color:#ffd54f;
}

button{
    position:absolute;
    top:20px;
    left:20px;

    background:none;
    border:none;
    cursor:pointer;

    transition:.2s;
}

button:hover{
    transform:scale(1.1);
}
</style>
</head>

<body>

<h1>Ranking</h1>

<div id="top3"></div>
<div id="lista"></div>

<button onclick="voltar()">
    <img src="X_Elementrix.png" width="75">
</button>

<script>
const API = "https://elementrix-api.onrender.com";
async function carregarRanking(){

    let res = await fetch(`${API}/ranking`);
    let dados = await res.json();

    let top3 = document.getElementById("top3");
    let lista = document.getElementById("lista");

    top3.innerHTML = "";
    lista.innerHTML = "";

    let cores = ["gold","silver","bronze"];

    dados.slice(3,10).forEach((user, i)=>{

    let div = document.createElement("div");

    div.classList.add("item");

    div.innerHTML = `
        <span class="posicao">
            #${i + 4}
        </span>

        <span>
            ${user.nome}
        </span>

        <span class="pontos">
            ${user.pontomax} pts
        </span>
    `;

    lista.appendChild(div);
});

    dados.slice(3,10).forEach((user, i)=>{
        let div = document.createElement("div");
        div.classList.add("item");

        div.textContent = `${i+4}º - ${user.nome} (${user.pontomax} pts)`;

        lista.appendChild(div);
    });
}

function voltar(){
    window.location.href = "menu.html";
}

carregarRanking();
</script>

</body>
</html>
