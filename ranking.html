<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ranking</title>

<style>

body{
    overflow:hidden;
    margin:0;
    min-height:100vh;

    font-family:Arial, Helvetica, sans-serif;

    background:
    linear-gradient(
        135deg,
        #ff5a00 0%,
        #311000 25%,
        #111111 50%,
        #001a33 75%,
        #00b7ff 100%
    );

    color:white;
}

h1{
    text-align:center;
    margin-top:25px;

    font-size:60px;

    text-shadow:
        0 0 15px rgba(255,255,255,.4),
        0 0 30px rgba(255,255,255,.2);
}

#top3{
    display:flex;

    justify-content:center;
    align-items:flex-end;

    gap:30px;

    margin-top:70px;
}

.top{

    width:200px;

    border-radius:25px 25px 0 0;

    padding:20px;

    text-align:center;

    backdrop-filter: blur(10px);

    border:2px solid rgba(255,255,255,.2);

    transition:.3s;

    box-shadow:
        0 0 30px rgba(0,0,0,.5);
}

.top:hover{
    transform:translateY(-10px) scale(1.03);
}

.top h2{
    margin:0;
    font-size:40px;
}

.top p{
    margin:10px 0;
    font-size:22px;
}

.gold{
    height:320px;

    background:
    linear-gradient(
        180deg,
        #ffd700,
        #ff9800
    );

    color:#111;

    box-shadow:
        0 0 40px rgba(255,215,0,.6);
}

.silver{
    height:250px;

    background:
    linear-gradient(
        180deg,
        #eeeeee,
        #9e9e9e
    );

    color:#111;

    box-shadow:
        0 0 35px rgba(255,255,255,.4);
}

.bronze{
    height:200px;

    background:
    linear-gradient(
        180deg,
        #cd7f32,
        #8d4e16
    );

    color:white;

    box-shadow:
        0 0 30px rgba(205,127,50,.5);
}

#lista{

    width:450px;

    margin:50px auto;

    display:flex;

    flex-direction:column;

    gap:15px;
}

.item{

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.12);

    padding:18px;

    border-radius:16px;

    font-size:22px;

    backdrop-filter: blur(10px);

    transition:.25s;

    box-shadow:
        0 0 15px rgba(0,0,0,.3);
}

.item:hover{
    transform:scale(1.03);

    background:rgba(255,255,255,.14);
}

button{
    position:absolute;

    top:20px;
    left:20px;

    background:none;

    border:none;

    cursor:pointer;

    transition:.2s;
}

button:hover{
    transform:scale(1.1);
}

button img{
    filter:
        drop-shadow(0 0 10px rgba(255,255,255,.4));
}

</style>
</head>

<body>

<h1>Ranking</h1>

<div id="top3"></div>
<div id="lista"></div>

<button onclick="voltar()">
    <img src="X_Elementrix.png" width="75">
</button>

<script>
const API = "https://elementrix-api.onrender.com";
async function carregarRanking(){

    let res = await fetch(`${API}/ranking`);
    let dados = await res.json();

    let top3 = document.getElementById("top3");
    let lista = document.getElementById("lista");

    top3.innerHTML = "";
    lista.innerHTML = "";

    let cores = ["gold","silver","bronze"];

    dados.slice(0,3).forEach((user, i)=>{
        let div = document.createElement("div");
        div.classList.add("top", cores[i]);

        div.innerHTML = `
            <h2>${i+1}º</h2>
            <p>${user.nome}</p>
            <p>${user.pontomax} pts</p>
        `;

        top3.appendChild(div);
    });

    dados.slice(3,10).forEach((user, i)=>{
        let div = document.createElement("div");
        div.classList.add("item");

        div.textContent = `${i+4}º - ${user.nome} (${user.pontomax} pts)`;

        lista.appendChild(div);
    });
}

function voltar(){
    window.location.href = "menu.html";
}

carregarRanking();
</script>

</body>
</html>
